name: Format Regression

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  windows-format-regression:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Windows dependencies
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path external -Force | Out-Null

          $sdlZip = Join-Path $env:RUNNER_TEMP "sdl2.zip"
          $sdlExtract = Join-Path $env:RUNNER_TEMP "sdl2_extract"
          Invoke-WebRequest -Uri "https://github.com/libsdl-org/SDL/releases/download/release-2.30.11/SDL2-devel-2.30.11-VC.zip" -OutFile $sdlZip
          if (Test-Path $sdlExtract) {
            Remove-Item -Path $sdlExtract -Recurse -Force
          }
          Expand-Archive -Path $sdlZip -DestinationPath $sdlExtract -Force
          $sdlRoot = Get-ChildItem -Path $sdlExtract -Directory | Select-Object -First 1
          Copy-Item -Path (Join-Path $sdlRoot.FullName "*") -Destination "external/SDL2" -Recurse -Force

          $ffmpegZip = Join-Path $env:RUNNER_TEMP "ffmpeg.zip"
          $ffmpegExtract = Join-Path $env:RUNNER_TEMP "ffmpeg_extract"
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip" -OutFile $ffmpegZip
          if (Test-Path $ffmpegExtract) {
            Remove-Item -Path $ffmpegExtract -Recurse -Force
          }
          Expand-Archive -Path $ffmpegZip -DestinationPath $ffmpegExtract -Force
          $ffmpegRoot = Get-ChildItem -Path $ffmpegExtract -Directory | Select-Object -First 1
          Copy-Item -Path (Join-Path $ffmpegRoot.FullName "*") -Destination "external/ffmpeg" -Recurse -Force

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DDEBUG_MODE=ON

      - name: Build Debug
        shell: pwsh
        run: cmake --build build --config Debug --target modern-video-player

      - name: Run sample prep and regression
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File .\tools\download_test_samples.ps1 -DurationSec 3
          powershell -ExecutionPolicy Bypass -File .\tools\run_all_checks.ps1 `
            -ExecutablePath "build/Debug/modern-video-player.exe" `
            -ProbeFile "juren-30s.mp4" `
            -SamplesFile "tools/format_regression/format_samples.csv" `
            -RegressionOutputFile "docs/reports/FORMAT_REGRESSION_CI.md"

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: format-regression-report
          if-no-files-found: warn
          path: |
            docs/reports/FORMAT_REGRESSION_CI.md
            logs/*.log
