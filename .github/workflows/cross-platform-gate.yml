name: Cross Platform Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  gate:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            build_dir: build
            executable: build/Release/modern-video-player.exe
            probe_file: samples/mp4/demo__h264_aac__1920x1080__60fps__2ch.mp4
          - os: ubuntu-22.04
            platform: linux
            build_dir: build-linux
            executable: build-linux/modern-video-player
            probe_file: samples/mp4/demo__h264_aac__1920x1080__60fps__2ch.mp4

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    env:
      MVP_REQUIRE_WINDOWS_VULKAN_CHECKS: "auto"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Windows dependencies
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $externalRoot = Join-Path $PWD "external"
          if (Test-Path $externalRoot) {
            Remove-Item -Path $externalRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $externalRoot -Force | Out-Null

          $sdlZip = Join-Path $env:RUNNER_TEMP "sdl2.zip"
          $sdlExtract = Join-Path $env:RUNNER_TEMP "sdl2_extract"
          Invoke-WebRequest -Uri "https://github.com/libsdl-org/SDL/releases/download/release-2.30.11/SDL2-devel-2.30.11-VC.zip" -OutFile $sdlZip
          if (Test-Path $sdlExtract) {
            Remove-Item -Path $sdlExtract -Recurse -Force
          }
          Expand-Archive -Path $sdlZip -DestinationPath $sdlExtract -Force
          $sdlRoot = Get-ChildItem -Path $sdlExtract -Directory | Select-Object -First 1
          if (-not $sdlRoot) {
            throw "SDL archive extraction did not produce a top-level directory."
          }
          Move-Item -Path $sdlRoot.FullName -Destination (Join-Path $externalRoot "SDL2") -Force

          $ffmpegZip = Join-Path $env:RUNNER_TEMP "ffmpeg.zip"
          $ffmpegExtract = Join-Path $env:RUNNER_TEMP "ffmpeg_extract"
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip" -OutFile $ffmpegZip
          if (Test-Path $ffmpegExtract) {
            Remove-Item -Path $ffmpegExtract -Recurse -Force
          }
          Expand-Archive -Path $ffmpegZip -DestinationPath $ffmpegExtract -Force
          $ffmpegRoot = Get-ChildItem -Path $ffmpegExtract -Directory | Select-Object -First 1
          if (-not $ffmpegRoot) {
            throw "FFmpeg archive extraction did not produce a top-level directory."
          }
          Move-Item -Path $ffmpegRoot.FullName -Destination (Join-Path $externalRoot "ffmpeg") -Force

      - name: Install Windows Vulkan SDK (optional)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $sdkReady = $false
          $runtimeProbeAvailable = $false
          $runtimeProbeDetail = "not-run"
          $choco = Get-Command choco -ErrorAction SilentlyContinue
          if ($choco) {
            choco install vulkan-sdk --yes --no-progress
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "choco vulkan-sdk installation command failed; will try to use existing SDK path if available."
            }
          } else {
            Write-Warning "choco is unavailable on this runner; skipping Vulkan SDK install attempt."
          }

          $vulkanRoot = $null
          if (Test-Path "C:\\VulkanSDK") {
            $vulkanRoot = Get-ChildItem -Path "C:\\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          }
          if ($vulkanRoot) {
            "VULKAN_SDK=$($vulkanRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            if ([string]::IsNullOrWhiteSpace($env:CMAKE_PREFIX_PATH)) {
              "CMAKE_PREFIX_PATH=$($vulkanRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            } else {
              "CMAKE_PREFIX_PATH=$($vulkanRoot.FullName);$($env:CMAKE_PREFIX_PATH)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
            "$($vulkanRoot.FullName)\\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "Detected Vulkan SDK path: $($vulkanRoot.FullName)"
            $sdkReady = $true
          } else {
            Write-Warning "Windows Vulkan SDK path not detected after install attempt."
          }

          if ($sdkReady) {
            "MVP_WINDOWS_VULKAN_SDK_AVAILABLE=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            $vulkanInfoPath = Join-Path $vulkanRoot.FullName "Bin\\vulkaninfo.exe"
            if (Test-Path $vulkanInfoPath) {
              & $vulkanInfoPath --summary *> $null
              if ($LASTEXITCODE -eq 0) {
                $runtimeProbeAvailable = $true
                $runtimeProbeDetail = "vulkaninfo-sdk-bin"
              } else {
                $runtimeProbeDetail = "vulkaninfo-sdk-bin-exit-$LASTEXITCODE"
              }
            } else {
              $vulkanInfoCommand = Get-Command vulkaninfo -ErrorAction SilentlyContinue
              if ($vulkanInfoCommand) {
                & $vulkanInfoCommand.Source --summary *> $null
                if ($LASTEXITCODE -eq 0) {
                  $runtimeProbeAvailable = $true
                  $runtimeProbeDetail = "vulkaninfo-path"
                } else {
                  $runtimeProbeDetail = "vulkaninfo-path-exit-$LASTEXITCODE"
                }
              } else {
                $runtimeProbeDetail = "vulkaninfo-missing"
              }
            }
          } else {
            "MVP_WINDOWS_VULKAN_SDK_AVAILABLE=0" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            $runtimeProbeDetail = "sdk-missing"
          }

          if ($runtimeProbeAvailable) {
            "MVP_WINDOWS_VULKAN_RUNTIME_PROBE_AVAILABLE=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            "MVP_WINDOWS_VULKAN_RUNTIME_PROBE_AVAILABLE=0" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          "MVP_WINDOWS_VULKAN_RUNTIME_PROBE_DETAIL=$runtimeProbeDetail" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Windows Vulkan runtime probe available: $runtimeProbeAvailable ($runtimeProbeDetail)"

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            xvfb \
            ffmpeg \
            libsdl2-dev \
            libavformat-dev \
            libavcodec-dev \
            libavutil-dev \
            libswscale-dev \
            libswresample-dev \
            libass-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libvulkan-dev \
            mesa-vulkan-drivers \
            libva-dev

      - name: Prepare Windows probe media
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $probeFile = Join-Path $PWD '${{ matrix.probe_file }}'
          if (Test-Path $probeFile) {
            Write-Host "Probe media already exists: $probeFile"
            exit 0
          }

          $probeDir = Split-Path -Parent $probeFile
          New-Item -ItemType Directory -Path $probeDir -Force | Out-Null
          $ffmpegExe = Join-Path $PWD 'external/ffmpeg/bin/ffmpeg.exe'
          if (-not (Test-Path $ffmpegExe)) {
            throw "ffmpeg executable not found: $ffmpegExe"
          }

          & $ffmpegExe -hide_banner -loglevel error -y `
            -f lavfi -i "testsrc2=size=1920x1080:rate=60:duration=3" `
            -f lavfi -i "sine=frequency=1000:sample_rate=48000:duration=3" `
            -shortest -c:v libx264 -pix_fmt yuv420p `
            -c:a aac -ac 2 -b:a 128k `
            $probeFile
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to generate probe media: $probeFile"
          }

      - name: Prepare Linux probe media
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          probe_file="${{ matrix.probe_file }}"
          if [[ -f "$probe_file" ]]; then
            echo "Probe media already exists: $probe_file"
            exit 0
          fi

          mkdir -p "$(dirname "$probe_file")"
          ffmpeg -hide_banner -loglevel error -y \
            -f lavfi -i "testsrc2=size=1920x1080:rate=60:duration=3" \
            -f lavfi -i "sine=frequency=1000:sample_rate=48000:duration=3" \
            -shortest -c:v libx264 -pix_fmt yuv420p \
            -c:a aac -ac 2 -b:a 128k \
            "$probe_file"

      - name: Configure Windows build
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          cmake -S . -B ${{ matrix.build_dir }} -G "Visual Studio 17 2022" -A x64 -DDEBUG_MODE=ON -DENABLE_VULKAN_RENDERER=ON

      - name: Configure Linux build
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          cmake -S . -B "${{ matrix.build_dir }}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DDEBUG_MODE=OFF \
            -DENABLE_D3D11_RENDERER=OFF \
            -DENABLE_D3D11VA=OFF \
            -DENABLE_DXVA2=OFF \
            -DENABLE_OPENGL_RENDERER=ON \
            -DENABLE_SDL_RENDERER=ON \
            -DENABLE_VULKAN_RENDERER=ON \
            -DENABLE_VAAPI=ON \
            -DENABLE_VIDEOTOOLBOX=OFF

      - name: Build Windows Release
        if: matrix.platform == 'windows'
        shell: pwsh
        run: cmake --build ${{ matrix.build_dir }} --config Release --target modern-video-player sample_logger_plugin

      - name: Build Linux Release
        if: matrix.platform == 'linux'
        shell: bash
        run: cmake --build "${{ matrix.build_dir }}" --parallel --target modern-video-player sample_logger_plugin

      - name: Run Windows gate
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $env:Path = (Join-Path (Get-Location) 'external/ffmpeg/bin') + ';' + $env:Path
          New-Item -ItemType Directory -Path logs -Force | Out-Null
          .\${{ matrix.executable }} --d3d11-diagnostics
          .\${{ matrix.executable }} --d3d11-hdr-output-check .\${{ matrix.probe_file }} 1200
          $env:MVP_RENDERER_BACKEND = 'd3d11'
          .\${{ matrix.executable }} --performance-log-check .\${{ matrix.probe_file }} 1200
          Remove-Item Env:MVP_RENDERER_BACKEND -ErrorAction SilentlyContinue
          powershell -ExecutionPolicy Bypass -File .\tools\run_windows_vulkan_checks.ps1 -ExecutablePath '${{ matrix.executable }}' -ProbeFile '${{ matrix.probe_file }}' -SampleMs 1200 -SummaryOutputPath 'logs/windows-vulkan-gate-summary.env' 2>&1 | Tee-Object -FilePath 'logs/windows-vulkan-gate.log'
          $vulkanGateExitCode = $LASTEXITCODE
          $vulkanSummaryPath = 'logs/windows-vulkan-gate-summary.env'
          if (Test-Path $vulkanSummaryPath) {
            $vulkanSummary = @{}
            Get-Content -Path $vulkanSummaryPath | ForEach-Object {
              if ($_ -match '^\s*([^=]+)=(.*)$') {
                $key = $matches[1].Trim()
                $value = $matches[2].Trim()
                if (-not [string]::IsNullOrWhiteSpace($key)) {
                  $vulkanSummary[$key] = $value
                }
              }
            }

            $summaryRows = @(
              @("result", $vulkanSummary["windows-vulkan-check.result"]),
              @("mode", $vulkanSummary["windows-vulkan-check.mode"]),
              @("strict_mode_effective", $vulkanSummary["windows-vulkan-check.strict_mode_effective"]),
              @("strict_mode_policy", $vulkanSummary["windows-vulkan-check.strict_mode_policy"]),
              @("runner_vulkan_sdk_available", $vulkanSummary["windows-vulkan-check.runner_vulkan_sdk_available"]),
              @("runner_vulkan_runtime_probe_available", $vulkanSummary["windows-vulkan-check.runner_vulkan_runtime_probe_available"]),
              @("runner_vulkan_runtime_probe_detail", $vulkanSummary["windows-vulkan-check.runner_vulkan_runtime_probe_detail"]),
              @("diag_contract_valid", $vulkanSummary["windows-vulkan-check.diag_contract_valid"]),
              @("playback_contract_valid", $vulkanSummary["windows-vulkan-check.playback_contract_valid"]),
              @("failure_reason", $vulkanSummary["windows-vulkan-check.failure_reason"]),
              @("vulkan_availability_failure_detail", $vulkanSummary["windows-vulkan-check.vulkan_availability_failure_detail"]),
              @("playback_failure_detail", $vulkanSummary["windows-vulkan-check.playback_failure_detail"])
            )

            "### Windows Vulkan Gate Summary" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "| Key | Value |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "| --- | --- |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            foreach ($row in $summaryRows) {
              $rowValue = if ($null -ne $row[1] -and -not [string]::IsNullOrWhiteSpace([string]$row[1])) { [string]$row[1] } else { "n/a" }
              ("| {0} | {1} |" -f $row[0], $rowValue) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            }
          } else {
            "### Windows Vulkan Gate Summary" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "- windows-vulkan-gate-summary.env not found." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }
          if ($vulkanGateExitCode -ne 0) {
            throw "Windows Vulkan gate failed with exit code $vulkanGateExitCode. See logs/windows-vulkan-gate.log and logs/windows-vulkan-gate-summary.env."
          }
          powershell -ExecutionPolicy Bypass -File .\tools\run_windows_vulkan_gate_contract_canary.ps1 -ProbeFile '${{ matrix.probe_file }}' -SampleMs 1200 -SummaryOutputPath 'logs/windows-vulkan-gate-contract-canary-summary.env' -GateSummaryOutputPath 'logs/windows-vulkan-gate-contract-canary-gate.env' 2>&1 | Tee-Object -FilePath 'logs/windows-vulkan-gate-contract-canary.log'
          $vulkanCanaryExitCode = $LASTEXITCODE
          $vulkanCanarySummaryPath = 'logs/windows-vulkan-gate-contract-canary-summary.env'
          if (Test-Path $vulkanCanarySummaryPath) {
            $vulkanCanarySummary = @{}
            Get-Content -Path $vulkanCanarySummaryPath | ForEach-Object {
              if ($_ -match '^\s*([^=]+)=(.*)$') {
                $key = $matches[1].Trim()
                $value = $matches[2].Trim()
                if (-not [string]::IsNullOrWhiteSpace($key)) {
                  $vulkanCanarySummary[$key] = $value
                }
              }
            }

            $canaryRows = @(
              @("result", $vulkanCanarySummary["windows-vulkan-contract-canary.result"]),
              @("expected_gate_exit_code", $vulkanCanarySummary["windows-vulkan-contract-canary.expected_gate_exit_code"]),
              @("actual_gate_exit_code", $vulkanCanarySummary["windows-vulkan-contract-canary.actual_gate_exit_code"]),
              @("gate_summary_file_present", $vulkanCanarySummary["windows-vulkan-contract-canary.gate_summary_file_present"]),
              @("gate_result", $vulkanCanarySummary["windows-vulkan-contract-canary.gate_result"]),
              @("gate_failure_reason", $vulkanCanarySummary["windows-vulkan-contract-canary.gate_failure_reason"]),
              @("gate_diag_contract_valid", $vulkanCanarySummary["windows-vulkan-contract-canary.gate_diag_contract_valid"]),
              @("gate_vulkan_availability_failure_detail", $vulkanCanarySummary["windows-vulkan-contract-canary.gate_vulkan_availability_failure_detail"]),
              @("validation_failure_reason", $vulkanCanarySummary["windows-vulkan-contract-canary.validation_failure_reason"])
            )

            "### Windows Vulkan Gate Contract Canary" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "| Key | Value |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "| --- | --- |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            foreach ($row in $canaryRows) {
              $rowValue = if ($null -ne $row[1] -and -not [string]::IsNullOrWhiteSpace([string]$row[1])) { [string]$row[1] } else { "n/a" }
              ("| {0} | {1} |" -f $row[0], $rowValue) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            }
          } else {
            "### Windows Vulkan Gate Contract Canary" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "- windows-vulkan-gate-contract-canary-summary.env not found." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }
          if ($vulkanCanaryExitCode -ne 0) {
            throw "Windows Vulkan gate contract canary failed with exit code $vulkanCanaryExitCode. See logs/windows-vulkan-gate-contract-canary.log and logs/windows-vulkan-gate-contract-canary-summary.env."
          }
          powershell -ExecutionPolicy Bypass -File .\tools\run_windows_vulkan_gate_playback_contract_canary.ps1 -ProbeFile '${{ matrix.probe_file }}' -SampleMs 1200 -SummaryOutputPath 'logs/windows-vulkan-gate-playback-contract-canary-summary.env' -GateSummaryOutputPath 'logs/windows-vulkan-gate-playback-contract-canary-gate.env' 2>&1 | Tee-Object -FilePath 'logs/windows-vulkan-gate-playback-contract-canary.log'
          $vulkanPlaybackCanaryExitCode = $LASTEXITCODE
          $vulkanPlaybackCanarySummaryPath = 'logs/windows-vulkan-gate-playback-contract-canary-summary.env'
          if (Test-Path $vulkanPlaybackCanarySummaryPath) {
            $vulkanPlaybackCanarySummary = @{}
            Get-Content -Path $vulkanPlaybackCanarySummaryPath | ForEach-Object {
              if ($_ -match '^\s*([^=]+)=(.*)$') {
                $key = $matches[1].Trim()
                $value = $matches[2].Trim()
                if (-not [string]::IsNullOrWhiteSpace($key)) {
                  $vulkanPlaybackCanarySummary[$key] = $value
                }
              }
            }

            $playbackCanaryRows = @(
              @("result", $vulkanPlaybackCanarySummary["windows-vulkan-playback-contract-canary.result"]),
              @("expected_gate_exit_code", $vulkanPlaybackCanarySummary["windows-vulkan-playback-contract-canary.expected_gate_exit_code"]),
              @("actual_gate_exit_code", $vulkanPlaybackCanarySummary["windows-vulkan-playback-contract-canary.actual_gate_exit_code"]),
              @("gate_summary_file_present", $vulkanPlaybackCanarySummary["windows-vulkan-playback-contract-canary.gate_summary_file_present"]),
              @("gate_result", $vulkanPlaybackCanarySummary["windows-vulkan-playback-contract-canary.gate_result"]),
              @("gate_failure_reason", $vulkanPlaybackCanarySummary["windows-vulkan-playback-contract-canary.gate_failure_reason"]),
              @("gate_playback_contract_valid", $vulkanPlaybackCanarySummary["windows-vulkan-playback-contract-canary.gate_playback_contract_valid"]),
              @("gate_playback_failure_detail", $vulkanPlaybackCanarySummary["windows-vulkan-playback-contract-canary.gate_playback_failure_detail"]),
              @("validation_failure_reason", $vulkanPlaybackCanarySummary["windows-vulkan-playback-contract-canary.validation_failure_reason"])
            )

            "### Windows Vulkan Gate Playback Contract Canary" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "| Key | Value |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "| --- | --- |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            foreach ($row in $playbackCanaryRows) {
              $rowValue = if ($null -ne $row[1] -and -not [string]::IsNullOrWhiteSpace([string]$row[1])) { [string]$row[1] } else { "n/a" }
              ("| {0} | {1} |" -f $row[0], $rowValue) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            }
          } else {
            "### Windows Vulkan Gate Playback Contract Canary" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "- windows-vulkan-gate-playback-contract-canary-summary.env not found." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }
          if ($vulkanPlaybackCanaryExitCode -ne 0) {
            throw "Windows Vulkan gate playback-contract canary failed with exit code $vulkanPlaybackCanaryExitCode. See logs/windows-vulkan-gate-playback-contract-canary.log and logs/windows-vulkan-gate-playback-contract-canary-summary.env."
          }
          powershell -ExecutionPolicy Bypass -File .\tools\run_windows_vulkan_gate_pass_contract_canary.ps1 -ProbeFile '${{ matrix.probe_file }}' -SampleMs 1200 -SummaryOutputPath 'logs/windows-vulkan-gate-pass-contract-canary-summary.env' -GateSummaryOutputPath 'logs/windows-vulkan-gate-pass-contract-canary-gate.env' 2>&1 | Tee-Object -FilePath 'logs/windows-vulkan-gate-pass-contract-canary.log'
          $vulkanPassCanaryExitCode = $LASTEXITCODE
          $vulkanPassCanarySummaryPath = 'logs/windows-vulkan-gate-pass-contract-canary-summary.env'
          if (Test-Path $vulkanPassCanarySummaryPath) {
            $vulkanPassCanarySummary = @{}
            Get-Content -Path $vulkanPassCanarySummaryPath | ForEach-Object {
              if ($_ -match '^\s*([^=]+)=(.*)$') {
                $key = $matches[1].Trim()
                $value = $matches[2].Trim()
                if (-not [string]::IsNullOrWhiteSpace($key)) {
                  $vulkanPassCanarySummary[$key] = $value
                }
              }
            }

            $passCanaryRows = @(
              @("result", $vulkanPassCanarySummary["windows-vulkan-pass-contract-canary.result"]),
              @("expected_gate_exit_code", $vulkanPassCanarySummary["windows-vulkan-pass-contract-canary.expected_gate_exit_code"]),
              @("actual_gate_exit_code", $vulkanPassCanarySummary["windows-vulkan-pass-contract-canary.actual_gate_exit_code"]),
              @("gate_summary_file_present", $vulkanPassCanarySummary["windows-vulkan-pass-contract-canary.gate_summary_file_present"]),
              @("gate_result", $vulkanPassCanarySummary["windows-vulkan-pass-contract-canary.gate_result"]),
              @("gate_mode", $vulkanPassCanarySummary["windows-vulkan-pass-contract-canary.gate_mode"]),
              @("gate_strict_mode_effective", $vulkanPassCanarySummary["windows-vulkan-pass-contract-canary.gate_strict_mode_effective"]),
              @("gate_vulkan_availability_failure_detail", $vulkanPassCanarySummary["windows-vulkan-pass-contract-canary.gate_vulkan_availability_failure_detail"]),
              @("gate_playback_contract_valid", $vulkanPassCanarySummary["windows-vulkan-pass-contract-canary.gate_playback_contract_valid"]),
              @("gate_playback_failure_detail", $vulkanPassCanarySummary["windows-vulkan-pass-contract-canary.gate_playback_failure_detail"]),
              @("gate_failure_reason", $vulkanPassCanarySummary["windows-vulkan-pass-contract-canary.gate_failure_reason"]),
              @("validation_failure_reason", $vulkanPassCanarySummary["windows-vulkan-pass-contract-canary.validation_failure_reason"])
            )

            "### Windows Vulkan Gate PASS Contract Canary" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "| Key | Value |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            "| --- | --- |" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            foreach ($row in $passCanaryRows) {
              $rowValue = if ($null -ne $row[1] -and -not [string]::IsNullOrWhiteSpace([string]$row[1])) { [string]$row[1] } else { "n/a" }
              ("| {0} | {1} |" -f $row[0], $rowValue) | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
