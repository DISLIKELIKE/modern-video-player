name: Cross Platform Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  gate:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            build_dir: build
            executable: build/Release/modern-video-player.exe
            probe_file: samples/mp4/demo__h264_aac__1920x1080__60fps__2ch.mp4
          - os: ubuntu-22.04
            platform: linux
            build_dir: build-linux
            executable: build-linux/modern-video-player
            probe_file: samples/mp4/demo__h264_aac__1920x1080__60fps__2ch.mp4

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    env:
      MVP_REQUIRE_WINDOWS_VULKAN_CHECKS: "auto"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Windows dependencies
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $externalRoot = Join-Path $PWD "external"
          if (Test-Path $externalRoot) {
            Remove-Item -Path $externalRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $externalRoot -Force | Out-Null

          $sdlZip = Join-Path $env:RUNNER_TEMP "sdl2.zip"
          $sdlExtract = Join-Path $env:RUNNER_TEMP "sdl2_extract"
          Invoke-WebRequest -Uri "https://github.com/libsdl-org/SDL/releases/download/release-2.30.11/SDL2-devel-2.30.11-VC.zip" -OutFile $sdlZip
          if (Test-Path $sdlExtract) {
            Remove-Item -Path $sdlExtract -Recurse -Force
          }
          Expand-Archive -Path $sdlZip -DestinationPath $sdlExtract -Force
          $sdlRoot = Get-ChildItem -Path $sdlExtract -Directory | Select-Object -First 1
          if (-not $sdlRoot) {
            throw "SDL archive extraction did not produce a top-level directory."
          }
          Move-Item -Path $sdlRoot.FullName -Destination (Join-Path $externalRoot "SDL2") -Force

          $ffmpegZip = Join-Path $env:RUNNER_TEMP "ffmpeg.zip"
          $ffmpegExtract = Join-Path $env:RUNNER_TEMP "ffmpeg_extract"
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip" -OutFile $ffmpegZip
          if (Test-Path $ffmpegExtract) {
            Remove-Item -Path $ffmpegExtract -Recurse -Force
          }
          Expand-Archive -Path $ffmpegZip -DestinationPath $ffmpegExtract -Force
          $ffmpegRoot = Get-ChildItem -Path $ffmpegExtract -Directory | Select-Object -First 1
          if (-not $ffmpegRoot) {
            throw "FFmpeg archive extraction did not produce a top-level directory."
          }
          Move-Item -Path $ffmpegRoot.FullName -Destination (Join-Path $externalRoot "ffmpeg") -Force

      - name: Install Windows Vulkan SDK (optional)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $sdkReady = $false
          $runtimeProbeAvailable = $false
          $runtimeProbeDetail = "not-run"
          $choco = Get-Command choco -ErrorAction SilentlyContinue
          if ($choco) {
            choco install vulkan-sdk --yes --no-progress
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "choco vulkan-sdk installation command failed; will try to use existing SDK path if available."
            }
          } else {
            Write-Warning "choco is unavailable on this runner; skipping Vulkan SDK install attempt."
          }

          $vulkanRoot = $null
          if (Test-Path "C:\\VulkanSDK") {
            $vulkanRoot = Get-ChildItem -Path "C:\\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          }
          if ($vulkanRoot) {
            "VULKAN_SDK=$($vulkanRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            if ([string]::IsNullOrWhiteSpace($env:CMAKE_PREFIX_PATH)) {
              "CMAKE_PREFIX_PATH=$($vulkanRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            } else {
              "CMAKE_PREFIX_PATH=$($vulkanRoot.FullName);$($env:CMAKE_PREFIX_PATH)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
            "$($vulkanRoot.FullName)\\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "Detected Vulkan SDK path: $($vulkanRoot.FullName)"
            $sdkReady = $true
          } else {
            Write-Warning "Windows Vulkan SDK path not detected after install attempt."
          }

          if ($sdkReady) {
            "MVP_WINDOWS_VULKAN_SDK_AVAILABLE=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            $vulkanInfoPath = Join-Path $vulkanRoot.FullName "Bin\\vulkaninfo.exe"
            if (Test-Path $vulkanInfoPath) {
              & $vulkanInfoPath --summary *> $null
              if ($LASTEXITCODE -eq 0) {
                $runtimeProbeAvailable = $true
                $runtimeProbeDetail = "vulkaninfo-sdk-bin"
              } else {
                $runtimeProbeDetail = "vulkaninfo-sdk-bin-exit-$LASTEXITCODE"
              }
            } else {
              $vulkanInfoCommand = Get-Command vulkaninfo -ErrorAction SilentlyContinue
              if ($vulkanInfoCommand) {
                & $vulkanInfoCommand.Source --summary *> $null
                if ($LASTEXITCODE -eq 0) {
                  $runtimeProbeAvailable = $true
                  $runtimeProbeDetail = "vulkaninfo-path"
                } else {
                  $runtimeProbeDetail = "vulkaninfo-path-exit-$LASTEXITCODE"
                }
              } else {
                $runtimeProbeDetail = "vulkaninfo-missing"
              }
            }
          } else {
            "MVP_WINDOWS_VULKAN_SDK_AVAILABLE=0" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            $runtimeProbeDetail = "sdk-missing"
          }

          if ($runtimeProbeAvailable) {
            "MVP_WINDOWS_VULKAN_RUNTIME_PROBE_AVAILABLE=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            "MVP_WINDOWS_VULKAN_RUNTIME_PROBE_AVAILABLE=0" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          "MVP_WINDOWS_VULKAN_RUNTIME_PROBE_DETAIL=$runtimeProbeDetail" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Windows Vulkan runtime probe available: $runtimeProbeAvailable ($runtimeProbeDetail)"

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            xvfb \
            ffmpeg \
            libsdl2-dev \
            libavformat-dev \
            libavcodec-dev \
            libavutil-dev \
            libswscale-dev \
            libswresample-dev \
            libass-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libvulkan-dev \
            mesa-vulkan-drivers \
            libva-dev

      - name: Prepare Windows probe media
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $probeFile = Join-Path $PWD '${{ matrix.probe_file }}'
          if (Test-Path $probeFile) {
            Write-Host "Probe media already exists: $probeFile"
            exit 0
          }

          $probeDir = Split-Path -Parent $probeFile
          New-Item -ItemType Directory -Path $probeDir -Force | Out-Null
          $ffmpegExe = Join-Path $PWD 'external/ffmpeg/bin/ffmpeg.exe'
          if (-not (Test-Path $ffmpegExe)) {
            throw "ffmpeg executable not found: $ffmpegExe"
          }

          & $ffmpegExe -hide_banner -loglevel error -y `
            -f lavfi -i "testsrc2=size=1920x1080:rate=60:duration=3" `
            -f lavfi -i "sine=frequency=1000:sample_rate=48000:duration=3" `
            -shortest -c:v libx264 -pix_fmt yuv420p `
            -c:a aac -ac 2 -b:a 128k `
            $probeFile
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to generate probe media: $probeFile"
          }

      - name: Prepare Linux probe media
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          probe_file="${{ matrix.probe_file }}"
          if [[ -f "$probe_file" ]]; then
            echo "Probe media already exists: $probe_file"
            exit 0
          fi

          mkdir -p "$(dirname "$probe_file")"
          ffmpeg -hide_banner -loglevel error -y \
            -f lavfi -i "testsrc2=size=1920x1080:rate=60:duration=3" \
            -f lavfi -i "sine=frequency=1000:sample_rate=48000:duration=3" \
            -shortest -c:v libx264 -pix_fmt yuv420p \
            -c:a aac -ac 2 -b:a 128k \
            "$probe_file"

      - name: Configure Windows build
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          cmake -S . -B ${{ matrix.build_dir }} -G "Visual Studio 17 2022" -A x64 -DDEBUG_MODE=ON -DENABLE_VULKAN_RENDERER=ON

      - name: Configure Linux build
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          cmake -S . -B "${{ matrix.build_dir }}" \
            -DCMAKE_BUILD_TYPE=Release \
            -DDEBUG_MODE=OFF \
            -DENABLE_D3D11_RENDERER=OFF \
            -DENABLE_D3D11VA=OFF \
            -DENABLE_DXVA2=OFF \
            -DENABLE_OPENGL_RENDERER=ON \
            -DENABLE_SDL_RENDERER=ON \
            -DENABLE_VULKAN_RENDERER=ON \
            -DENABLE_VAAPI=ON \
            -DENABLE_VIDEOTOOLBOX=OFF

      - name: Build Windows Release
        if: matrix.platform == 'windows'
        shell: pwsh
        run: cmake --build ${{ matrix.build_dir }} --config Release --target modern-video-player sample_logger_plugin

      - name: Build Linux Release
        if: matrix.platform == 'linux'
        shell: bash
        run: cmake --build "${{ matrix.build_dir }}" --parallel --target modern-video-player sample_logger_plugin

      - name: Run Windows gate
        if: matrix.platform == 'windows'
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\tools\run_windows_ci_gate.ps1 -ExecutablePath '${{ matrix.executable }}' -ProbeFile '${{ matrix.probe_file }}' -SampleMs 1200 -BuildDir '${{ matrix.build_dir }}'
      - name: Run Linux gate
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./tools/run_linux_mvp_checks.sh ./tools/package_linux.sh
          mkdir -p logs
          xvfb-run -a bash ./tools/run_linux_mvp_checks.sh \
            "./${{ matrix.executable }}" \
            "./${{ matrix.probe_file }}" \
            1800 \
            "samples/subtitles/opengl_ass_style_validation.ass" \
            "build-linux/tmp/embedded-ass-validation.mkv" \
            120 \
            1 \
            "./${{ matrix.probe_file }}" \
            "samples/subtitles/opengl_ass_transform_transition_validation.ass" \
            "logs/linux-mvp-gate-summary.env" \
            1 \
            2>&1 | tee "logs/linux-mvp-gate.log"
          bash ./tools/package_linux.sh "${{ matrix.build_dir }}"

      - name: Upload gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-platform-gate-${{ matrix.platform }}
          if-no-files-found: warn
          path: |
            build/*.zip
            build/driver_quirk_samples.csv
            build-linux/*.deb
            build-linux/*.tar.gz
            logs/*.log
            logs/*.env
